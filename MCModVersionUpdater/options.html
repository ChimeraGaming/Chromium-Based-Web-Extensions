<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Mod Update Checker Settings</title>
  <style>
    body {
      --bg: #f8fafc;
      --fg: #111827;
      --card-bg: #ffffff;
      --card-border: #cbd5e1;
      --label: #374151;
      --input-bg: #ffffff;
      --input-fg: #111827;
      --input-border: #cbd5e1;
      --accent: #2563eb;
      --muted: #6b7280;
      --status: #166534;
      font-family: Arial, sans-serif;
      max-width: 960px;
      margin: 30px auto;
      padding: 0 16px 30px;
      background: var(--bg);
      color: var(--fg);
    }
    .card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; padding: 18px; margin-top: 16px; }
    h1, h2 { margin-top: 0; color: var(--fg); }
    label { display: block; margin: 12px 0; color: var(--label); }
    input[type="checkbox"], select, input[type="text"], textarea { margin-right: 8px; }
    input[type="checkbox"] { accent-color: var(--accent); }
    select, input[type="text"], textarea {
      width: 100%;
      max-width: 720px;
      background: var(--input-bg);
      color: var(--input-fg);
      border: 1px solid var(--input-border);
      border-radius: 10px;
      padding: 8px 10px;
      margin-top: 6px;
      box-sizing: border-box;
    }
    textarea {
      min-height: 160px;
      resize: vertical;
      font-family: Consolas, monospace;
    }
    .btn { background: var(--accent); color: white; border: 0; border-radius: 10px; padding: 10px 14px; cursor: pointer; font-weight: 700; margin-right: 8px; }
    .muted { color: var(--muted); line-height: 1.5; }
    #status { margin-top: 12px; color: var(--status); font-weight: 700; min-height: 20px; }

    body.muc-theme-dark {
      --bg: #0f172a;
      --fg: #f8fafc;
      --card-bg: #111827;
      --card-border: #374151;
      --label: #d1d5db;
      --input-bg: #1f2937;
      --input-fg: #f8fafc;
      --input-border: #374151;
      --accent: #2563eb;
      --muted: #9ca3af;
      --status: #86efac;
    }

    body.muc-theme-github-dark {
      --bg: #0d1117;
      --fg: #c9d1d9;
      --card-bg: #161b22;
      --card-border: #30363d;
      --label: #c9d1d9;
      --input-bg: #0d1117;
      --input-fg: #c9d1d9;
      --input-border: #30363d;
      --accent: #2f81f7;
      --muted: #8b949e;
      --status: #3fb950;
    }

    body.muc-theme-snes-rainbow {
      --bg: #23203d;
      --fg: #ecebff;
      --card-bg: #2b2847;
      --card-border: #5f5b85;
      --label: #ecebff;
      --input-bg: #3a365d;
      --input-fg: #ecebff;
      --input-border: #5f5b85;
      --accent: #8f8acb;
      --muted: #d0cdf2;
      --status: #9cff7f;
    }
  </style>
</head>
<body>
  <h1>Mod Update Checker Settings</h1>

  <div class="card">
    <h2>Core Settings</h2>
    <label><input type="checkbox" id="includeBeta"> Include beta versions in recommendations</label>
    <label><input type="checkbox" id="includeAlpha"> Include alpha versions in recommendations</label>
    <label><input type="checkbox" id="reverseCompatible"> Search backwards from the target version if needed</label>
    <label><input type="checkbox" id="fuzzyDescriptionReplacementSearch"> Fuzzy search mod descriptions to find replacement mods</label>
    <label><input type="checkbox" id="ignoreCurrentVersionMods"> Ignore mods already on selected target version</label>
    <label><input type="checkbox" id="onlyUpdatesCurrentSelected"> Only check updates for mods already on selected target version</label>

    <label>Target Minecraft version
      <input type="text" id="targetVersion" list="mcVersionList" autocomplete="off" spellcheck="false">
      <datalist id="mcVersionList"></datalist>
    </label>

    <label>Default table size
      <select id="density">
        <option value="compact">Compact</option>
        <option value="comfortable">Comfortable</option>
        <option value="expanded">Expanded</option>
      </select>
    </label>

    <label>Theme
      <select id="theme">
        <option value="light">Light</option>
        <option value="dark">Dark</option>
        <option value="github-dark">Github (Dark)</option>
        <option value="snes-rainbow">SNES</option>
      </select>
    </label>

    <label>Minecraft version database - one per line
      <textarea id="minecraftVersionDatabase"></textarea>
    </label>
  </div>

  <div class="card">
    <h2>Additional Sources</h2>
    <label>Extra source URLs - one per line
      <textarea id="additionalSourceUrls" placeholder="https://github.com/owner/repo&#10;https://example.com/docs"></textarea>
    </label>
    <div class="muted">
      GitHub repo URLs open repo scoped searches. Other URLs open a site scoped search in a new tab.
    </div>
  </div>

  <div class="card">
    <h2>API and Cache</h2>
    <label>CurseForge API key
      <input type="text" id="curseforgeApiKey" autocomplete="off" spellcheck="false" placeholder="Leave blank in final builds">
    </label>
    <label>Modrinth API key (optional)
      <input type="text" id="modrinthApiKey" autocomplete="off" spellcheck="false" placeholder="Optional for authenticated requests">
    </label>

    <button class="btn" id="saveBtn">Save settings</button>
    <button class="btn" id="clearCacheBtn">Clear API cache</button>
    <div id="status"></div>
  </div>

  <div class="card">
    <h2>Notes</h2>
    <div class="muted">
      This page is focused on scan behavior and API settings only. Save here, then rescan from the page panel.
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
